name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python scripts/check_openapi_schema.py
      - run: python -m pytest tests -q --ignore=tests/test_postgres_repos.py

  api-postgres-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    env:
      DATABASE_URL: postgresql+psycopg://portfolio:portfolio@localhost:5432/portfolio
      PERSISTENCE_BACKEND: postgres
      ENVIRONMENT: development
      JWT_SECRET: ci-test-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolio
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python -m pytest tests/test_postgres_repos.py -q

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence
    env:
      DISABLE_AUTH_MIDDLEWARE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json
      - run: npm ci
      - run: npm run web:build
