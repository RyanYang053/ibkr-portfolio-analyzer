name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    env:
      GIT_SHA: ${{ github.sha }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python scripts/check_openapi_schema.py
      - run: python -m pytest tests -q --ignore=tests/test_postgres_repos.py

  release-manifest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    env:
      GIT_SHA: ${{ github.sha }}
      GITHUB_SHA: ${{ github.sha }}
      ENVIRONMENT: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Run golden and release certification tests
        run: |
          python -m pytest tests/test_valuation_golden_fixtures.py tests/test_pnl_reconciliation_golden.py tests/test_version_and_release_manifest.py -q --junitxml=pytest-release-report.xml
      - name: Write golden fixture digest file
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          roots = [
              Path("tests/test_valuation_golden_fixtures.py"),
              Path("tests/test_pnl_reconciliation_golden.py"),
          ]
          digest = hashlib.sha256()
          for path in sorted(roots):
              digest.update(path.read_bytes())
          out = Path("golden-fixture-digest.txt")
          out.write_text(digest.hexdigest() + "\n", encoding="utf-8")
          print(out.read_text(encoding="utf-8").strip())
          PY
      - name: Write release manifest
        run: |
          python scripts/write_release_manifest.py \
            --out release-manifest.json \
            --pytest-report pytest-release-report.xml \
            --golden-hash-file golden-fixture-digest.txt \
            --mode ci_evidence \
            --require-certified
      - name: Assert CI evidence complete without false production certification
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("release-manifest.json").read_text(encoding="utf-8"))
          assert manifest["code_sha"] and manifest["code_sha"] != "unknown"
          assert manifest["pytest_report_sha256"]
          assert manifest["golden_fixture_sha256"]
          cert = manifest["certification"]
          assert cert["mode"] == "ci_evidence"
          assert cert["evidence_complete"] is True
          assert cert["certified"] is False
          assert "code_sha_unknown" not in cert["blockers"]
          if manifest.get("container_digest") == "placeholder":
              assert "container_digest_placeholder" in cert["blockers"]
          print("CI evidence manifest ok; production certified=false as expected")
          PY
      - name: Upload release-manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: |
            ai-portfolio-intelligence/apps/api/release-manifest.json
            ai-portfolio-intelligence/apps/api/pytest-release-report.xml
            ai-portfolio-intelligence/apps/api/golden-fixture-digest.txt
          if-no-files-found: error

  api-financial-integrity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_financial_integrity.py tests/test_risk_integrity.py tests/test_audit_pr4_pr10.py tests/test_audit_remaining.py tests/test_scheduler_concurrency.py tests/test_institutional_scope.py tests/test_audit_correctness.py tests/test_audit_wave5.py tests/test_audit_wave6.py -q

  api-postgres-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    env:
      DATABASE_URL: postgresql+psycopg://portfolio:portfolio@localhost:5432/portfolio
      PERSISTENCE_BACKEND: postgres
      ENVIRONMENT: development
      JWT_SECRET: ci-test-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolio
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python -m pytest tests/test_postgres_repos.py tests/test_postgres_scheduler_concurrency.py -q

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence
    env:
      DISABLE_AUTH_MIDDLEWARE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json
      - run: npm ci
      - run: npm run web:build

  e2e-authenticated:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence
    env:
      BROKER_MODE: mock_ibkr_readonly
      DISABLE_AUTH_ENFORCEMENT: "false"
      BOOTSTRAP_TOKEN: ci-bootstrap-token
      JWT_SECRET: ci-test-secret
      PERSISTENCE_BACKEND: json
      RUN_AUTHENTICATED_E2E: "true"
      E2E_EMAIL: e2e@example.com
      E2E_PASSWORD: e2e-password
      BACKEND_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      E2E_BASE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json
      - name: Install API dependencies
        working-directory: ai-portfolio-intelligence/apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
      - name: Install and build web app
        run: |
          npm ci
          npm run web:build
      - name: Start API and bootstrap user
        working-directory: ai-portfolio-intelligence/apps/api
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
              break
            fi
            if [[ "${attempt}" -eq 30 ]]; then
              echo "API health check failed"
              exit 1
            fi
            sleep 1
          done
          BOOTSTRAP_STATUS="$(curl -s -o /tmp/bootstrap.json -w '%{http_code}' -X POST http://127.0.0.1:8000/auth/bootstrap \
            -H 'Content-Type: application/json' \
            -d '{"bootstrap_token":"ci-bootstrap-token","email":"e2e@example.com","password":"e2e-password","name":"E2E User"}')"
          if [[ "${BOOTSTRAP_STATUS}" != "200" && "${BOOTSTRAP_STATUS}" != "409" ]]; then
            cat /tmp/bootstrap.json || true
            echo "Bootstrap failed with status ${BOOTSTRAP_STATUS}"
            exit 1
          fi
      - name: Start web server
        env:
          DISABLE_AUTH_MIDDLEWARE: "false"
          BACKEND_URL: http://127.0.0.1:8000
        run: |
          STANDALONE_SERVER="$(find apps/web/.next/standalone -path '*/apps/web/server.js' | head -n 1)"
          STANDALONE_ROOT="$(dirname "${STANDALONE_SERVER}")"
          mkdir -p "${STANDALONE_ROOT}/.next"
          cp -r apps/web/.next/static "${STANDALONE_ROOT}/.next/static"
          cp -r apps/web/public "${STANDALONE_ROOT}/public"
          (
            cd "${STANDALONE_ROOT}"
            HOSTNAME=127.0.0.1 PORT=3000 node server.js
          ) &
          for attempt in $(seq 1 60); do
            LOGIN_HTML="$(curl -fsS http://127.0.0.1:3000/login 2>/dev/null || true)"
            if [[ "${LOGIN_HTML}" == *login-email* ]]; then
              break
            fi
            if [[ "${attempt}" -eq 60 ]]; then
              curl -s http://127.0.0.1:3000/login | head -c 500 || true
              echo "Web login page did not render the sign-in form"
              exit 1
            fi
            sleep 1
          done
      - name: Run authenticated Playwright E2E
        working-directory: ai-portfolio-intelligence/apps/api
        run: python -m pytest tests/test_e2e_authenticated.py -q

  migration-roundtrip:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    env:
      DATABASE_URL: postgresql+psycopg://portfolio:portfolio@localhost:5432/portfolio
      PERSISTENCE_BACKEND: postgres
      ENVIRONMENT: development
      JWT_SECRET: ci-test-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolio
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: alembic downgrade 0017_edgar_fact_lineage
      - run: alembic upgrade head

  financial-golden-master:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_financial_integrity.py tests/test_optimizer_min_variance_constraints.py tests/test_optimizer_reference_solutions.py tests/test_edgar_point_in_time.py tests/test_valuation_model_gates.py tests/test_options_contract_risk.py tests/test_risk_factor_diagnostics.py -q

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run docker compose smoke
        working-directory: ai-portfolio-intelligence
        run: bash infra/scripts/docker_smoke.sh

  api-lint-type:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check app tests
      - run: mypy app --explicit-package-bases --follow-imports=skip --cache-dir=/dev/null

  api-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/test_benchmark_attribution.py tests/test_tax_modules.py tests/test_valuation_golden_fixtures.py --cov=app --cov-report=term-missing --cov-fail-under=35 -q

  web-lint-type:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence
    env:
      DISABLE_AUTH_MIDDLEWARE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json
      - run: npm ci
      - run: npm run web:lint
      - run: npm run web:typecheck

  dependency-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence/apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pip-audit
      # ecdsa has no fixed release for PYSEC-2026-1325 (transitive via python-jose).
      # Starlette 1.x-only advisories require a larger FastAPI major migration; 0.49.1 closes the 0.4x CVEs.
      - run: >
          pip-audit -r requirements.txt
          --ignore-vuln PYSEC-2026-1325
          --ignore-vuln PYSEC-2026-161
          --ignore-vuln PYSEC-2026-249
          --ignore-vuln PYSEC-2026-248
          --ignore-vuln PYSEC-2026-2281
          --ignore-vuln PYSEC-2026-2280

  production-postgres-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence
    env:
      DATABASE_URL: postgresql+psycopg://portfolio:portfolio@localhost:5432/portfolio
      PERSISTENCE_BACKEND: postgres
      ENVIRONMENT: production
      JWT_SECRET: ci-production-e2e-secret
      BOOTSTRAP_TOKEN: ci-production-e2e-bootstrap
      BROKER_MODE: mock_ibkr_readonly
      SEC_EDGAR_USER_AGENT: PortfolioIntelligence/1.0 ci-contact@portfolio-intelligence.test
      SCHEDULER_ENABLED: "false"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolio
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - working-directory: ai-portfolio-intelligence/apps/api
        run: pip install -r requirements.txt
      - name: Run migrations
        working-directory: ai-portfolio-intelligence/apps/api
        run: alembic upgrade head
      - name: Start API
        working-directory: ai-portfolio-intelligence/apps/api
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health/live >/dev/null; then
              break
            fi
            sleep 1
          done
      - run: bash infra/scripts/production_e2e.sh

  backup-restore:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence
    env:
      DATABASE_URL: postgresql+psycopg://portfolio:portfolio@localhost:5432/portfolio
      POSTGRES_PASSWORD: portfolio
      PERSISTENCE_BACKEND: postgres
      ENVIRONMENT: production
      JWT_SECRET: ci-backup-restore-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolio
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - working-directory: ai-portfolio-intelligence/apps/api
        run: pip install -r requirements.txt
      - run: bash infra/scripts/backup_restore_smoke.sh

  web-dependency-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-portfolio-intelligence
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python,javascript-typescript
      - uses: github/codeql-action/analyze@v3

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        working-directory: ai-portfolio-intelligence
        run: docker build -f apps/api/Dockerfile -t ibkr-api:ci-scan apps/api
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ibkr-api:ci-scan
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ai-portfolio-intelligence/apps/api
          format: cyclonedx-json
          artifact-name: api-sbom
