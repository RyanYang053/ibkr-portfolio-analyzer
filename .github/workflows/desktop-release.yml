name: Desktop

on:
  pull_request:
    paths:
      - ".github/workflows/desktop-release.yml"
      - "ai-portfolio-intelligence/apps/api/**"
      - "ai-portfolio-intelligence/apps/web/**"
      - "ai-portfolio-intelligence/apps/desktop/**"
      - "ai-portfolio-intelligence/scripts/**"
      - "ai-portfolio-intelligence/package.json"
      - "ai-portfolio-intelligence/package-lock.json"

  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - ".github/workflows/desktop-release.yml"
      - "ai-portfolio-intelligence/apps/api/**"
      - "ai-portfolio-intelligence/apps/web/**"
      - "ai-portfolio-intelligence/apps/desktop/**"
      - "ai-portfolio-intelligence/scripts/**"
      - "ai-portfolio-intelligence/package.json"
      - "ai-portfolio-intelligence/package-lock.json"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ai-portfolio-intelligence

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt
          pip install pyinstaller keyring

      - name: Run complete API suite
        working-directory: ai-portfolio-intelligence/apps/api
        run: python -m pytest tests -q --ignore=tests/test_postgres_repos.py

      - name: Verify no-trading boundary
        working-directory: ai-portfolio-intelligence/apps/api
        run: python -m pytest tests/test_no_trading_guardrails.py tests/test_decision_never_generates_orders.py -q

      - name: Run local desktop integration smoke
        run: python scripts/desktop_local_smoke.py

      - name: Run desktop export/restore smoke
        run: python scripts/desktop_restore_smoke.py

      - name: Install web dependencies
        run: npm ci

      - name: Web lint
        run: npm run web:lint

      - name: Web typecheck
        run: npm run web:typecheck

      - name: Static desktop export
        run: python scripts/prepare-tauri-binaries.py --no-require-sidecar
        env:
          NEXT_PUBLIC_DEPLOYMENT_MODE: desktop_local

  package:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/desktop-v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: app,dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ai-portfolio-intelligence

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pyinstaller keyring

      - name: Install JS dependencies
        run: npm ci

      - name: Build exact-SHA sidecar
        run: python scripts/build-backend-sidecar.py

      - name: Prepare static frontend and validate sidecar
        run: python scripts/prepare-tauri-binaries.py
        env:
          NEXT_PUBLIC_DEPLOYMENT_MODE: desktop_local

      - name: Packaged sidecar smoke
        run: python scripts/smoke-packaged-sidecar.py

      - name: Rust check
        working-directory: ai-portfolio-intelligence/apps/desktop/src-tauri
        run: cargo check --locked

      - name: Build platform installer
        working-directory: ai-portfolio-intelligence/apps/desktop
        run: >
          npm run build --
          --target ${{ matrix.target }}
          --bundles ${{ matrix.bundles }}

      - name: Upload exact-SHA installers
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-analyzer-${{ matrix.target }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            ai-portfolio-intelligence/apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**
            ai-portfolio-intelligence/apps/desktop/src-tauri/target/release/bundle/**

  publish-draft-release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: portfolio-analyzer-*
          merge-multiple: false

      - name: Collect installer files
        id: collect
        run: |
          mkdir -p dist
          find release-artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.msi' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.app.tar.gz' \
          \) -exec cp {} dist/ \;
          ls -la dist
          test "$(find dist -type f | wc -l)" -gt 0

      - name: Create draft prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Portfolio Analyzer ${{ github.ref_name }}
          draft: true
          prerelease: true
          files: dist/*
          body: |
            Draft unsigned installers for `${{ github.sha }}`.

            Do not promote beyond prerelease until signing/notarization and
            packaged launch smoke are verified for this exact SHA.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
