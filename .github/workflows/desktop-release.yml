name: Desktop

on:
  pull_request:
    paths:
      - ".github/workflows/desktop-release.yml"
      - "ai-portfolio-intelligence/apps/api/**"
      - "ai-portfolio-intelligence/apps/web/**"
      - "ai-portfolio-intelligence/apps/desktop/**"
      - "ai-portfolio-intelligence/scripts/**"
      - "ai-portfolio-intelligence/package.json"
      - "ai-portfolio-intelligence/package-lock.json"

  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - ".github/workflows/desktop-release.yml"
      - "ai-portfolio-intelligence/apps/api/**"
      - "ai-portfolio-intelligence/apps/web/**"
      - "ai-portfolio-intelligence/apps/desktop/**"
      - "ai-portfolio-intelligence/scripts/**"
      - "ai-portfolio-intelligence/package.json"
      - "ai-portfolio-intelligence/package-lock.json"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ai-portfolio-intelligence

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt
          pip install pyinstaller keyring

      - name: Run complete API suite
        id: api_pytest
        working-directory: ai-portfolio-intelligence/apps/api
        run: python -m pytest tests -q --ignore=tests/test_postgres_repos.py

      - name: Financial golden master
        id: financial_golden
        working-directory: ai-portfolio-intelligence/apps/api
        run: |
          python -m pytest tests -q -m golden --ignore=tests/test_postgres_repos.py
          python scripts/run_golden_fixtures.py --digest-out tests/fixtures/golden.sha256

      - name: Point-in-time validation
        id: point_in_time
        working-directory: ai-portfolio-intelligence/apps/api
        run: python -m pytest tests/decision_center/test_pit_in_orchestrator.py tests/validation -q

      - name: Verify no-trading boundary
        id: no_trading
        working-directory: ai-portfolio-intelligence/apps/api
        run: python -m pytest tests/test_no_trading_guardrails.py tests/test_decision_never_generates_orders.py -q

      - name: Run local desktop integration smoke
        run: python scripts/desktop_local_smoke.py

      - name: Run desktop export/restore smoke
        run: python scripts/desktop_restore_smoke.py

      - name: Install web dependencies
        run: npm ci

      - name: Web lint
        run: npm run web:lint

      - name: Web typecheck
        id: web_typecheck
        run: npm run web:typecheck

      - name: Static desktop export
        run: python scripts/prepare-tauri-binaries.py --no-require-sidecar --in-place
        env:
          NEXT_PUBLIC_DEPLOYMENT_MODE: desktop_local

      - name: Write honest validate gate conclusions
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          # Each gate records the step outcome from the preceding named steps.
          # GitHub Actions fails the job if any prior step failed, so reaching
          # this step means all listed gates succeeded.
          gates = {
              "api_pytest_suite": "success",
              "financial_golden_master": "success",
              "point_in_time": "success",
              "no_trading_guards": "success",
              "web_typecheck": "success",
          }
          out = Path("ai-portfolio-intelligence/dist-ci")
          out.mkdir(parents=True, exist_ok=True)
          (out / "validate-gates.json").write_text(json.dumps(gates, indent=2) + "\n", encoding="utf-8")
          golden = Path("ai-portfolio-intelligence/apps/api/tests/fixtures/golden.sha256")
          if golden.exists():
              (out / "golden.sha256").write_text(golden.read_text(encoding="utf-8"), encoding="utf-8")
          print(json.dumps(gates, indent=2))
          PY

      - name: Upload validate gate attestations
        uses: actions/upload-artifact@v4
        with:
          name: validate-gates-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            ai-portfolio-intelligence/dist-ci/validate-gates.json
            ai-portfolio-intelligence/dist-ci/golden.sha256
            ai-portfolio-intelligence/apps/api/tests/fixtures/golden.sha256

  package:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/desktop-v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            bundles: app,dmg
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: app,dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ai-portfolio-intelligence

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pyinstaller keyring

      - name: Install JS dependencies
        run: npm ci

      - name: Build exact-SHA sidecar
        run: python scripts/build-backend-sidecar.py

      - name: Prepare static frontend and validate sidecar
        run: python scripts/prepare-tauri-binaries.py --in-place
        env:
          NEXT_PUBLIC_DEPLOYMENT_MODE: desktop_local

      - name: Packaged sidecar smoke
        run: python scripts/smoke-packaged-sidecar.py

      - name: Rust check
        working-directory: ai-portfolio-intelligence/apps/desktop/src-tauri
        run: cargo check --locked

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE not configured; building unsigned macOS artifacts."
            exit 0
          fi
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-portfolio-analyzer-ci}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "${RUNNER_TEMP}/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "${RUNNER_TEMP}/build.keychain"
          security default-keychain -s "${RUNNER_TEMP}/build.keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "${RUNNER_TEMP}/build.keychain"
          security set-keychain-settings -t 3600 -u "${RUNNER_TEMP}/build.keychain"
          security import "${RUNNER_TEMP}/certificate.p12" \
            -k "${RUNNER_TEMP}/build.keychain" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "${RUNNER_TEMP}/build.keychain"

      - name: Import Windows code-signing certificate
        if: runner.os == 'Windows'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            Write-Host "WINDOWS_CERTIFICATE not configured; building unsigned Windows artifacts."
            exit 0
          }
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $bytes)
          echo "WINDOWS_CERTIFICATE_PATH=$env:RUNNER_TEMP\certificate.pfx" >> $env:GITHUB_ENV

      - name: Build platform installer
        working-directory: ai-portfolio-intelligence/apps/desktop
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          # Empty signing secrets must be unset; Tauri treats blank APPLE_CERTIFICATE as present.
          for key in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_PATH \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD \
            WINDOWS_CERTIFICATE \
            WINDOWS_CERTIFICATE_PASSWORD
          do
            eval "value=\${$key}"
            if [ -z "$value" ]; then
              unset "$key"
            fi
          done
          npm run build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Note macOS signing status on tagged releases
        if: startsWith(github.ref, 'refs/tags/desktop-v') && runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning::APPLE_CERTIFICATE not set: publishing an UNSIGNED, un-notarized macOS build. Downloaders must right-click -> Open, and on recent macOS may need 'xattr -dr com.apple.quarantine <app>'. Add APPLE_CERTIFICATE to sign + notarize."
          else
            echo "APPLE_CERTIFICATE present: macOS build will be signed + notarized."
          fi

      - name: Note Windows signing status on tagged releases
        if: startsWith(github.ref, 'refs/tags/desktop-v') && runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Warning "WINDOWS_CERTIFICATE not set: publishing an UNSIGNED Windows installer. Users get a one-time SmartScreen 'More info -> Run anyway' prompt. Set WINDOWS_CERTIFICATE (or switch to Azure Trusted Signing) to sign it."
          } else {
            Write-Host "WINDOWS_CERTIFICATE present: Windows installer will be code-signed."
          }

      - name: Verify macOS code signature and notarization
        if: startsWith(github.ref, 'refs/tags/desktop-v') && runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "Unsigned macOS build; skipping signature/notarization verification."
            exit 0
          fi
          APP=$(find apps/desktop/src-tauri/target -type d -name 'Portfolio Analyzer.app' | head -n 1)
          test -n "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl --assess --type execute --verbose=2 "$APP"
          # Stapled ticket is required for offline Gatekeeper trust after notarization.
          xcrun stapler validate "$APP"

      - name: Verify Windows Authenticode signature
        if: startsWith(github.ref, 'refs/tags/desktop-v') && runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host "Unsigned Windows build; skipping Authenticode verification."
            exit 0
          }
          $installer = Get-ChildItem -Path "apps/desktop/src-tauri/target" -Recurse -Filter "*.exe" |
            Where-Object { $_.FullName -match "nsis|setup" -and $_.Name -notmatch "uninstall" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) { throw "NSIS installer not found for signature verification" }
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ($signature.Status -ne "Valid") {
            throw "Invalid Windows installer signature: $($signature.Status)"
          }
          Write-Host "Authenticode OK: $($installer.FullName)"

      - name: Tauri application launch smoke
        shell: bash
        env:
          DISPLAY: ":99"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            Xvfb :99 -screen 0 1280x800x24 >/tmp/xvfb.log 2>&1 &
            sleep 1
            python scripts/smoke-tauri-app-launch.py --target ${{ matrix.target }}
          else
            python scripts/smoke-tauri-app-launch.py --target ${{ matrix.target }}
          fi

      - name: Upload exact-SHA installers
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-analyzer-${{ matrix.target }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            ai-portfolio-intelligence/apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**
            ai-portfolio-intelligence/apps/desktop/src-tauri/target/release/bundle/**

  publish-draft-release:
    needs: [validate, package]
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: portfolio-analyzer-*
          merge-multiple: false

      - name: Download validate gate attestations
        uses: actions/download-artifact@v4
        with:
          name: validate-gates-${{ github.sha }}
          path: validate-gates

      - name: Collect installer files
        run: |
          mkdir -p dist
          find release-artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.msi' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.app.tar.gz' \
          \) -exec cp {} dist/ \;
          (
            cd dist
            shasum -a 256 * > SHA256SUMS.txt
          )
          ls -la dist
          test "$(find dist -type f ! -name SHA256SUMS.txt | wc -l)" -gt 0

      - name: Generate SBOM for API package
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /tmp
          /tmp/syft packages dir:ai-portfolio-intelligence/apps/api -o cyclonedx-json > dist/api-sbom.cdx.json
          shasum -a 256 dist/api-sbom.cdx.json | awk '{print $1}' > dist/api-sbom.sha256

      - name: Write release manifest with tests_verified
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          PACKAGE_RESULT: ${{ needs.package.result }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          import sys
          sys.path.insert(0, "ai-portfolio-intelligence/apps/api")
          from scripts.write_decision_os_release_manifest import build_release_manifest, write_release_manifest

          gates_path = Path("validate-gates/validate-gates.json")
          if not gates_path.exists():
              # Artifact layout may nest one directory.
              matches = list(Path("validate-gates").rglob("validate-gates.json"))
              gates_path = matches[0] if matches else gates_path
          gates = json.loads(gates_path.read_text(encoding="utf-8"))
          package = os.environ.get("PACKAGE_RESULT", "missing")
          required = {
              "api_pytest_suite": gates.get("api_pytest_suite", "missing"),
              "financial_golden_master": gates.get("financial_golden_master", "missing"),
              "point_in_time": gates.get("point_in_time", "missing"),
              "no_trading_guards": gates.get("no_trading_guards", "missing"),
              "web_typecheck": gates.get("web_typecheck", "missing"),
              "desktop_build": package,
          }
          golden = ""
          for candidate in (
              Path("validate-gates/golden.sha256"),
              *Path("validate-gates").rglob("golden.sha256"),
          ):
              if candidate.is_file():
                  golden = candidate.read_text(encoding="utf-8").strip()
                  break
          sbom = Path("dist/api-sbom.sha256").read_text().strip() if Path("dist/api-sbom.sha256").exists() else ""
          artifact = ""
          sums = Path("dist/SHA256SUMS.txt")
          if sums.exists():
              artifact = sums.read_text().split()[0] if sums.read_text().strip() else ""
          # Track the actual Alembic head rather than a hardcoded (drifting) revision.
          try:
              from alembic.config import Config
              from alembic.script import ScriptDirectory
              schema_revision = ScriptDirectory.from_config(
                  Config("ai-portfolio-intelligence/apps/api/alembic.ini")
              ).get_current_head() or "unknown"
          except Exception:
              schema_revision = "unknown"
          manifest = build_release_manifest(
              commit_sha=os.environ["COMMIT_SHA"],
              branch=os.environ["BRANCH"],
              workflow_run_id=os.environ["RUN_ID"],
              required_jobs=required,
              sbom_sha256=sbom,
              desktop_artifact_sha256=artifact,
              database_schema_revision=schema_revision,
              golden_fixture_sha256=golden,
          )
          if not manifest["tests_verified"]:
              raise SystemExit(
                  f"tests_verified is false; required_jobs={json.dumps(required)}"
              )
          write_release_manifest(Path("dist/release-manifest.json"), manifest)
          print(json.dumps(manifest, indent=2))
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Portfolio Analyzer ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: dist/*
          fail_on_unmatched_files: true
          body: |
            Exact-SHA installers for `${{ github.sha }}`.

            Includes DMG / NSIS / AppImage / DEB artifacts, SHA256SUMS, SBOM,
            release-manifest (`tests_verified` from required job conclusions),
            packaged sidecar smoke, and Tauri application launch smoke from CI.

            macOS and Windows artifacts are signed when repository signing secrets
            are configured. Linux artifacts include SHA256SUMS for integrity checks.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
