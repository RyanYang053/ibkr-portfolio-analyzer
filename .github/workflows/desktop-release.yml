name: Desktop

on:
  pull_request:
    paths:
      - ".github/workflows/desktop-release.yml"
      - "ai-portfolio-intelligence/apps/api/**"
      - "ai-portfolio-intelligence/apps/web/**"
      - "ai-portfolio-intelligence/apps/desktop/**"
      - "ai-portfolio-intelligence/scripts/**"
      - "ai-portfolio-intelligence/package.json"
      - "ai-portfolio-intelligence/package-lock.json"

  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - ".github/workflows/desktop-release.yml"
      - "ai-portfolio-intelligence/apps/api/**"
      - "ai-portfolio-intelligence/apps/web/**"
      - "ai-portfolio-intelligence/apps/desktop/**"
      - "ai-portfolio-intelligence/scripts/**"
      - "ai-portfolio-intelligence/package.json"
      - "ai-portfolio-intelligence/package-lock.json"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ai-portfolio-intelligence

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-portfolio-intelligence/apps/api/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt
          pip install pyinstaller keyring

      - name: Run complete API suite
        working-directory: ai-portfolio-intelligence/apps/api
        run: python -m pytest tests -q --ignore=tests/test_postgres_repos.py

      - name: Verify no-trading boundary
        working-directory: ai-portfolio-intelligence/apps/api
        run: python -m pytest tests/test_no_trading_guardrails.py tests/test_decision_never_generates_orders.py -q

      - name: Run local desktop integration smoke
        run: python scripts/desktop_local_smoke.py

      - name: Run desktop export/restore smoke
        run: python scripts/desktop_restore_smoke.py

      - name: Install web dependencies
        run: npm ci

      - name: Web lint
        run: npm run web:lint

      - name: Web typecheck
        run: npm run web:typecheck

      - name: Static desktop export
        run: python scripts/prepare-tauri-binaries.py --no-require-sidecar --in-place
        env:
          NEXT_PUBLIC_DEPLOYMENT_MODE: desktop_local

  package:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/desktop-v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            bundles: app,dmg
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: app,dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ai-portfolio-intelligence

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-intelligence/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pyinstaller keyring

      - name: Install JS dependencies
        run: npm ci

      - name: Build exact-SHA sidecar
        run: python scripts/build-backend-sidecar.py

      - name: Prepare static frontend and validate sidecar
        run: python scripts/prepare-tauri-binaries.py --in-place
        env:
          NEXT_PUBLIC_DEPLOYMENT_MODE: desktop_local

      - name: Packaged sidecar smoke
        run: python scripts/smoke-packaged-sidecar.py

      - name: Rust check
        working-directory: ai-portfolio-intelligence/apps/desktop/src-tauri
        run: cargo check --locked

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE not configured; building unsigned macOS artifacts."
            exit 0
          fi
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-portfolio-analyzer-ci}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "${RUNNER_TEMP}/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "${RUNNER_TEMP}/build.keychain"
          security default-keychain -s "${RUNNER_TEMP}/build.keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "${RUNNER_TEMP}/build.keychain"
          security set-keychain-settings -t 3600 -u "${RUNNER_TEMP}/build.keychain"
          security import "${RUNNER_TEMP}/certificate.p12" \
            -k "${RUNNER_TEMP}/build.keychain" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "${RUNNER_TEMP}/build.keychain"

      - name: Import Windows code-signing certificate
        if: runner.os == 'Windows'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            Write-Host "WINDOWS_CERTIFICATE not configured; building unsigned Windows artifacts."
            exit 0
          }
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $bytes)
          echo "WINDOWS_CERTIFICATE_PATH=$env:RUNNER_TEMP\certificate.pfx" >> $env:GITHUB_ENV

      - name: Build platform installer
        working-directory: ai-portfolio-intelligence/apps/desktop
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          # Empty signing secrets must be unset; Tauri treats blank APPLE_CERTIFICATE as present.
          for key in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_PATH \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD \
            WINDOWS_CERTIFICATE \
            WINDOWS_CERTIFICATE_PASSWORD
          do
            eval "value=\${$key}"
            if [ -z "$value" ]; then
              unset "$key"
            fi
          done
          npm run build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Require signing on tagged releases
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          if [ "${{ runner.os }}" = "macOS" ] && [ -z "$APPLE_CERTIFICATE" ]; then
            echo "Tagged desktop releases require APPLE_CERTIFICATE for signing/notarization."
            exit 1
          fi
          if [ "${{ runner.os }}" = "Windows" ] && [ -z "$WINDOWS_CERTIFICATE" ]; then
            echo "Tagged desktop releases require WINDOWS_CERTIFICATE for code signing."
            exit 1
          fi
          echo "Signing gate passed for ${{ runner.os }}."

      - name: Tauri application launch smoke
        shell: bash
        env:
          DISPLAY: ":99"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            Xvfb :99 -screen 0 1280x800x24 >/tmp/xvfb.log 2>&1 &
            sleep 1
            python scripts/smoke-tauri-app-launch.py --target ${{ matrix.target }}
          else
            python scripts/smoke-tauri-app-launch.py --target ${{ matrix.target }}
          fi

      - name: Upload exact-SHA installers
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-analyzer-${{ matrix.target }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            ai-portfolio-intelligence/apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**
            ai-portfolio-intelligence/apps/desktop/src-tauri/target/release/bundle/**

  publish-draft-release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: portfolio-analyzer-*
          merge-multiple: false

      - name: Collect installer files
        run: |
          mkdir -p dist
          find release-artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.msi' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.app.tar.gz' \
          \) -exec cp {} dist/ \;
          (
            cd dist
            shasum -a 256 * > SHA256SUMS.txt
          )
          ls -la dist
          test "$(find dist -type f ! -name SHA256SUMS.txt | wc -l)" -gt 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Portfolio Analyzer ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: dist/*
          fail_on_unmatched_files: true
          body: |
            Exact-SHA installers for `${{ github.sha }}`.

            Includes DMG / NSIS / AppImage / DEB artifacts, SHA256SUMS, packaged
            sidecar smoke, and Tauri application launch smoke from CI.

            macOS and Windows artifacts are signed when repository signing secrets
            are configured. Linux artifacts include SHA256SUMS for integrity checks.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
