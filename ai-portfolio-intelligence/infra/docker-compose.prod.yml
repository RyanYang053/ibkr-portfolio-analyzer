services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - portfolio-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://portfolio:${POSTGRES_PASSWORD}@postgres:5432/portfolio
      PERSISTENCE_BACKEND: postgres
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:?BOOTSTRAP_TOKEN is required}
      BROKER_MODE: ${BROKER_MODE:-ibkr_readonly}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      IBKR_FLEX_TOKEN: ${IBKR_FLEX_TOKEN:-}
      IBKR_FLEX_QUERY_ID: ${IBKR_FLEX_QUERY_ID:-}
      IBKR_FLEX_ACTIVITY_QUERY_ID: ${IBKR_FLEX_ACTIVITY_QUERY_ID:-}
      SCHEDULER_RUN_IN_API: "false"
      DISABLE_AUTH_ENFORCEMENT: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  scheduler:
    build:
      context: ../apps/api
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://portfolio:${POSTGRES_PASSWORD}@postgres:5432/portfolio
      PERSISTENCE_BACKEND: postgres
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      BROKER_MODE: ${BROKER_MODE:-ibkr_readonly}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      IBKR_FLEX_TOKEN: ${IBKR_FLEX_TOKEN:-}
      IBKR_FLEX_QUERY_ID: ${IBKR_FLEX_QUERY_ID:-}
      IBKR_FLEX_ACTIVITY_QUERY_ID: ${IBKR_FLEX_ACTIVITY_QUERY_ID:-}
      SCHEDULER_ENABLED: "true"
      SCHEDULER_RUN_IN_API: "false"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib; raise SystemExit(0 if pathlib.Path('/proc/1/cmdline').read_bytes().find(b'app.worker')>=0 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal

  web:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_API_URL: http://api:8000
    environment:
      BACKEND_URL: http://api:8000
      DISABLE_AUTH_MIDDLEWARE: "false"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  portfolio-postgres:
